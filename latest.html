<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latest Episodes – GSP ANIME</title>
<link rel="stylesheet" href="style.css">
<style>
.latest-list{display:flex;flex-direction:column;gap:12px;}
.latest-item{display:flex;gap:16px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius);overflow:hidden;transition:all .2s;text-decoration:none;}
.latest-item:hover{border-color:rgba(0,245,255,.3);background:rgba(0,245,255,.03);transform:translateX(4px);}
.li-thumb{width:120px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:40px;background:var(--lbg);}
.li-info{padding:14px 16px;flex:1;}
.li-title{font-family:var(--font-heading);font-weight:700;font-size:16px;margin-bottom:6px;}
.li-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.li-meta span{font-family:var(--font-heading);font-size:12px;color:var(--text-muted);}
.li-meta .ep-num{color:var(--neon-cyan);font-weight:700;}
.li-meta .rat{color:var(--neon-yellow);}
.li-desc{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5;}
.li-actions{display:flex;align-items:center;gap:8px;padding:14px 16px;flex-shrink:0;}
.li-time{font-size:10px;color:var(--text-muted);font-family:var(--font-heading);margin-top:8px;}
</style>
</head>
<body>
<div class="scanlines"></div>
<div id="navbar-mount"></div>
<div class="page-wrap">
  <div class="page-hero"><div class="cyber-grid-bg"></div>
    <div class="page-hero-title">⚡ Latest Episodes</div>
    <div class="page-hero-sub">Freshest episodes — updated daily with subs & dubs</div>
  </div>
  <section>
    <div class="filters-wrap">
      <button class="filter-btn active" data-lf="all">All</button>
      <button class="filter-btn" data-lf="sub">Sub</button>
      <button class="filter-btn" data-lf="dub">Dub</button>
      <button class="filter-btn" data-lf="1080p">1080p</button>
      <button class="filter-btn" data-lf="ongoing">Ongoing</button>
    </div>
    <div class="latest-list" id="latestList"></div>
  </section>
</div>
<div id="footer-mount"></div>
<script src="anime-db.js"></script>
<script>
document.getElementById('navbar-mount').innerHTML = renderNavbar('latest.html');
document.getElementById('footer-mount').innerHTML = renderFooter();
initShared();

const times=['2 min ago','14 min ago','1 hr ago','3 hrs ago','5 hrs ago','8 hrs ago','12 hrs ago','Yesterday','2 days ago','3 days ago','4 days ago','5 days ago'];

function renderLatest(list) {
  document.getElementById('latestList').innerHTML = list.map((a,i)=>`
    <a href="player.html?id=${a.id}&ep=${a.currentEp}" class="latest-item">
      <div class="li-thumb" style="--lbg:${a.bg}">${a.emoji}</div>
      <div class="li-info">
        <div class="li-title">${a.title}</div>
        <div class="li-meta">
          <span class="ep-num">EP ${a.currentEp}</span>
          <span class="rat">★ ${a.rating}</span>
          <span>${a.language.join(' / ')}</span>
          <span>${a.quality[0]}</span>
          <span style="color:${a.status==='Ongoing'?'var(--neon-green)':'var(--text-muted)'}">${a.status}</span>
        </div>
        <div class="li-desc">${a.synopsis.substring(0,100)}…</div>
        <div class="li-time">🕐 ${times[i]||'Recently'}</div>
      </div>
      <div class="li-actions">
        <span class="btn-watch" style="padding:8px 14px;font-size:12px;">▶ Watch</span>
      </div>
    </a>`).join('');
}

renderLatest(ANIME_DB.filter(a=>!a.isMovie));

document.querySelectorAll('.filter-btn[data-lf]').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn[data-lf]').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    const f=this.dataset.lf;
    let list=ANIME_DB.filter(a=>!a.isMovie);
    if(f==='sub') list=list.filter(a=>a.language.includes('Sub'));
    else if(f==='dub') list=list.filter(a=>a.language.includes('Dub'));
    else if(f==='1080p') list=list.filter(a=>a.quality.includes('1080p'));
    else if(f==='ongoing') list=list.filter(a=>a.status==='Ongoing');
    renderLatest(list);
  });
});
</script>
</body>
</html>
