<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Watch – GSP ANIME</title>
<link rel="stylesheet" href="style.css">
<style>
.player-page{padding:24px 40px 56px;}
.player-breadcrumb{font-family:var(--font-heading);font-size:13px;color:var(--text-muted);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.player-breadcrumb a{color:var(--neon-cyan);transition:color .2s;}
.player-breadcrumb a:hover{color:#fff;}
.player-breadcrumb span{color:var(--text-muted);}
.player-layout{display:grid;grid-template-columns:1fr 300px;gap:28px;}
/* Player */
.player-main{}
.player-wrap{background:#000;border-radius:var(--radius-lg);overflow:hidden;aspect-ratio:16/9;position:relative;border:1px solid var(--border-glass);display:flex;align-items:center;justify-content:center;flex-direction:column;}
.player-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.player-placeholder{display:flex;flex-direction:column;align-items:center;gap:16px;z-index:1;}
.player-play-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--neon-yellow),var(--neon-cyan));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#000;box-shadow:var(--glow-cyan);cursor:pointer;animation:pulseScale 2.5s infinite;}
@keyframes pulseScale{0%,100%{transform:scale(1)}50%{transform:scale(1.1);box-shadow:0 0 40px rgba(0,245,255,.7)}}
.player-lbl{font-family:var(--font-heading);font-weight:600;font-size:14px;color:var(--text-muted);}
.player-ep-title{font-family:var(--font-display);font-size:13px;color:var(--neon-cyan);letter-spacing:.5px;}
/* Controls bar */
.controls-bar{background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius);padding:12px 16px;margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.controls-label{font-family:var(--font-heading);font-size:11px;font-weight:600;color:var(--neon-yellow);letter-spacing:.5px;white-space:nowrap;}
.ctrl-sep{width:1px;height:20px;background:var(--border-glass);flex-shrink:0;}
.dl-dropdown{position:relative;}
.dl-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg-dark);border:1px solid var(--border-glass);border-radius:10px;overflow:hidden;z-index:50;min-width:180px;display:none;}
.dl-dropdown:hover .dl-menu,.dl-dropdown.open .dl-menu{display:block;}
.dl-item{padding:10px 16px;font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-primary);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px;}
.dl-item:hover{background:rgba(255,45,107,.08);color:var(--neon-pink);}
/* Auto next */
.auto-next-bar{background:rgba(0,245,255,.06);border:1px solid rgba(0,245,255,.15);border-radius:var(--radius);padding:10px 16px;margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.auto-next-label{font-family:var(--font-heading);font-size:13px;font-weight:600;color:var(--text-muted);}
.auto-next-ep{font-family:var(--font-heading);font-size:13px;font-weight:700;color:var(--neon-cyan);}
.toggle{width:42px;height:22px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--neon-cyan);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;}
.toggle.on::after{transform:translateX(20px);}
/* Episode list mini */
.ep-mini-wrap{margin-top:14px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-lg);overflow:hidden;}
.ep-mini-header{padding:12px 16px;border-bottom:1px solid var(--border-glass);display:flex;align-items:center;justify-content:space-between;}
.ep-mini-title{font-family:var(--font-heading);font-weight:700;font-size:14px;}
.ep-mini-body{max-height:200px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:8px;padding:12px;}
.ep-mini-pill{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:6px;padding:6px 12px;font-family:var(--font-heading);font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block;}
.ep-mini-pill:hover,.ep-mini-pill.current{border-color:var(--neon-yellow);color:var(--neon-yellow);background:rgba(255,229,0,.08);}
/* Sidebar */
.player-sidebar{}
.sidebar-section-title{font-family:var(--font-heading);font-weight:700;font-size:14px;color:var(--text-muted);letter-spacing:.5px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-glass);display:flex;align-items:center;gap:8px;}
.related-list{display:flex;flex-direction:column;gap:10px;}
.related-item{display:flex;gap:10px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:8px;overflow:hidden;transition:all .2s;text-decoration:none;}
.related-item:hover{border-color:rgba(0,245,255,.3);background:rgba(0,245,255,.04);}
.related-thumb{width:78px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;min-height:64px;}
.related-info{padding:8px 8px 8px 0;flex:1;}
.related-name{font-family:var(--font-heading);font-weight:700;font-size:12px;margin-bottom:3px;}
.related-ep{font-size:10px;color:var(--text-muted);}
/* Info card */
.anime-info-card{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:16px;margin-top:20px;}
.anime-info-card .atitle{font-family:var(--font-heading);font-weight:700;font-size:15px;margin-bottom:6px;}
.anime-info-card .ameta{font-size:12px;color:var(--text-muted);margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;}
.anime-info-card .adesc{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:12px;}
/* Ad popup container */
.ad-popup-container{background:rgba(255,229,0,.03);border:1px dashed rgba(255,229,0,.1);border-radius:8px;padding:12px;text-align:center;font-size:10px;color:var(--text-muted);font-family:var(--font-heading);margin-top:14px;}
@media(max-width:1024px){.player-layout{grid-template-columns:1fr;}.related-list{display:grid;grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){.player-page{padding:16px 20px 40px;}}
</style>
</head>
<body>
<div class="scanlines"></div>
<div id="navbar-mount"></div>
<div class="page-wrap">
  <div class="player-page">
    <div class="player-breadcrumb" id="breadcrumb"></div>
    <div class="player-layout">
      <div class="player-main">
        <div class="player-wrap" id="playerWrap">
          <div class="cyber-grid-bg" style="opacity:.15;"></div>
          <div class="player-placeholder" id="playerPlaceholder">
            <div class="player-play-icon" id="playBtn">▶</div>
            <div class="player-lbl" id="playerLbl">Click to stream</div>
            <div class="player-ep-title" id="playerEpTitle"></div>
          </div>
        </div>

        <div class="controls-bar">
          <span class="controls-label">SERVER:</span>
          <div id="serverBtns"></div>
          <div class="ctrl-sep"></div>
          <div class="dl-dropdown">
            <button class="btn-dl" id="dlBtn">⬇ Download ▾</button>
            <div class="dl-menu" id="dlMenu"></div>
          </div>
          <div class="ctrl-sep"></div>
          <button class="btn-server" id="prevEpBtn">◀ Prev</button>
          <button class="btn-server" id="nextEpBtn">Next ▶</button>
        </div>

        <div class="auto-next-bar">
          <div>
            <div class="auto-next-label">Auto-play next episode</div>
            <div class="auto-next-ep" id="nextEpLabel"></div>
          </div>
          <div class="toggle on" id="autoToggle" onclick="this.classList.toggle('on')"></div>
        </div>

        <div class="ep-mini-wrap">
          <div class="ep-mini-header">
            <div class="ep-mini-title">📋 Episodes</div>
            <span id="epRangeLabel" style="font-size:12px;color:var(--text-muted);font-family:var(--font-heading);"></span>
          </div>
          <div class="ep-mini-body" id="epMiniBody"></div>
        </div>
      </div>

      <div class="player-sidebar">
        <div class="sidebar-section-title">📺 Related Anime</div>
        <div class="related-list" id="relatedList"></div>
        <div class="anime-info-card" id="animeInfoCard"></div>
        <div class="ad-popup-container">📢 Ad Slot · 300×250 Sidebar Banner</div>
      </div>
    </div>
  </div>
</div>
<div id="footer-mount"></div>

<script src="anime-db.js"></script>
<script>
document.getElementById('navbar-mount').innerHTML = renderNavbar('player.html');
document.getElementById('footer-mount').innerHTML = renderFooter();
initShared();

const params = new URLSearchParams(location.search);
const anime = getAnimeById(params.get('id')) || ANIME_DB[0];
let curEp = parseInt(params.get('ep')) || 1;
let curServerIdx = 0;

document.getElementById('pageTitle').textContent = `${anime.title} EP${curEp} – GSP ANIME`;

// Breadcrumb
document.getElementById('breadcrumb').innerHTML =
  `<a href="index.html">Home</a> › <a href="anime-list.html">Anime List</a> › <a href="detail.html?id=${anime.id}">${anime.title}</a> › <span>Episode ${curEp}</span>`;

// Player
const placeholder = document.getElementById('playerPlaceholder');
const playerWrap = document.getElementById('playerWrap');
document.getElementById('playerEpTitle').textContent = `${anime.title} · Episode ${curEp}`;
document.getElementById('playerLbl').textContent = `${anime.title} – Episode ${curEp}`;

document.getElementById('playBtn').addEventListener('click', function() {
  const iframe = document.createElement('iframe');
  iframe.className = 'player-iframe';
  iframe.src = anime.servers[curServerIdx].url;
  iframe.allowFullscreen = true;
  iframe.setAttribute('allow','autoplay;fullscreen');
  placeholder.style.display = 'none';
  playerWrap.appendChild(iframe);
});

// Server buttons
const serverBtns = document.getElementById('serverBtns');
serverBtns.style.display = 'flex';
serverBtns.style.gap = '8px';
serverBtns.style.flexWrap = 'wrap';
anime.servers.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = `btn-server${i===0?' active':''}`;
  btn.textContent = `🖥 ${s.name.split('·')[0]}`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    curServerIdx = i;
    // Reload iframe if already playing
    const existing = playerWrap.querySelector('.player-iframe');
    if(existing) existing.src = s.url;
  });
  serverBtns.appendChild(btn);
});

// Download menu
document.getElementById('dlMenu').innerHTML = anime.downloads.map(d =>
  `<div class="dl-item">📥 ${d}</div>`).join('');

// Episode navigation
function updateEpNav() {
  const epIdx = anime.episodes.findIndex(e => e.ep === curEp);
  const prev = anime.episodes[epIdx - 1];
  const next = anime.episodes[epIdx + 1];
  document.getElementById('prevEpBtn').disabled = !prev;
  document.getElementById('prevEpBtn').onclick = prev ? () => goToEp(prev.ep) : null;
  document.getElementById('nextEpBtn').disabled = !next;
  document.getElementById('nextEpBtn').onclick = next ? () => goToEp(next.ep) : null;
  document.getElementById('nextEpLabel').textContent = next ? `Next: Episode ${next.ep}` : 'Last episode';
}

function goToEp(ep) {
  window.location.href = `player.html?id=${anime.id}&ep=${ep}`;
}

// Episode pills
const epBody = document.getElementById('epMiniBody');
document.getElementById('epRangeLabel').textContent = `${anime.episodes.length} total`;
anime.episodes.forEach(ep => {
  const a = document.createElement('a');
  a.href = `player.html?id=${anime.id}&ep=${ep.ep}`;
  a.className = `ep-mini-pill${ep.ep===curEp?' current':''}`;
  a.textContent = `EP ${ep.ep}`;
  epBody.appendChild(a);
});

updateEpNav();

// Related anime
const related = ANIME_DB.filter(a=>a.id!==anime.id).slice(0,6);
document.getElementById('relatedList').innerHTML = related.map(a => `
  <a href="player.html?id=${a.id}&ep=1" class="related-item">
    <div class="related-thumb" style="background:${a.bg}">${a.emoji}</div>
    <div class="related-info">
      <div class="related-name">${a.title}</div>
      <div class="related-ep">EP ${a.currentEp} · ${a.language[0]} · ${a.quality[0]}</div>
    </div>
  </a>`).join('');

// Anime info card
document.getElementById('animeInfoCard').innerHTML = `
  <div class="atitle">${anime.title}</div>
  <div class="ameta">
    <span>★ ${anime.rating}</span>
    <span>${anime.totalEpisodes} Eps</span>
    <span>${anime.status}</span>
  </div>
  <div class="adesc">${anime.synopsis.substring(0,120)}…</div>
  <a href="detail.html?id=${anime.id}" class="btn-info" style="font-size:13px;padding:7px 16px;">Full Details →</a>`;
</script>
</body>
</html>
