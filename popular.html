<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popular Anime – GSP ANIME</title>
<link rel="stylesheet" href="style.css">
<style>
.trending-big{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:24px;}
.trend-card-big{position:relative;border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;aspect-ratio:2/3;transition:transform .3s;display:block;}
.trend-card-big:hover{transform:scale(1.03);}
.trend-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;}
.trend-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 40%,transparent);}
.trend-content{position:absolute;bottom:0;left:0;right:0;padding:18px;}
.trend-rank-badge{position:absolute;top:12px;left:12px;font-family:var(--font-display);font-size:12px;font-weight:900;background:rgba(0,0,0,.7);border:1px solid rgba(255,229,0,.4);color:var(--neon-yellow);padding:4px 9px;border-radius:6px;}
.rating-badge-abs{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.7);border:1px solid rgba(255,229,0,.4);border-radius:6px;padding:4px 8px;font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--neon-yellow);}
.trend-title{font-family:var(--font-heading);font-weight:700;font-size:15px;margin-bottom:6px;}
.trend-tags{display:flex;gap:6px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="scanlines"></div>
<div id="navbar-mount"></div>
<div class="page-wrap">
  <div class="page-hero"><div class="cyber-grid-bg"></div>
    <div class="page-hero-title">🔥 Popular Anime</div>
    <div class="page-hero-sub">Top-rated and most-watched anime on GSP ANIME</div>
  </div>
  <section>
    <div class="filters-wrap">
      <button class="filter-btn active" data-f="all">All</button>
      <button class="filter-btn" data-f="action">Action</button>
      <button class="filter-btn" data-f="fantasy">Fantasy</button>
      <button class="filter-btn" data-f="shonen">Shonen</button>
      <button class="filter-btn" data-f="ongoing">Ongoing</button>
    </div>
    <div class="trending-big" id="popularGrid"></div>
  </section>
</div>
<div id="footer-mount"></div>
<script src="anime-db.js"></script>
<script>
document.getElementById('navbar-mount').innerHTML = renderNavbar('popular.html');
document.getElementById('footer-mount').innerHTML = renderFooter();
initShared();

function renderPopular(list) {
  document.getElementById('popularGrid').innerHTML = list
    .sort((a,b)=>b.rating-a.rating)
    .map((a,i)=>`
    <a href="detail.html?id=${a.id}" class="trend-card-big">
      <div class="trend-bg" style="background:${a.bg}">${a.emoji}</div>
      <div class="trend-overlay"></div>
      <div class="trend-rank-badge">#${i+1}</div>
      <div class="rating-badge-abs">★ ${a.rating}</div>
      <div class="trend-content">
        <div class="trend-title">${a.title}</div>
        <div class="trend-tags">${a.genres.slice(0,2).map(g=>`<span class="tag">${g}</span>`).join('')}
          <span class="tag" style="border-color:${a.status==='Ongoing'?'rgba(0,255,136,.3)':'rgba(255,255,255,.15)'};color:${a.status==='Ongoing'?'#00FF88':'var(--text-muted)'}">${a.status}</span>
        </div>
      </div>
    </a>`).join('');
}

renderPopular(ANIME_DB);

document.querySelectorAll('.filter-btn[data-f]').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn[data-f]').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    const f=this.dataset.f;
    let list=ANIME_DB;
    if(f==='action') list=ANIME_DB.filter(a=>a.genres.includes('Action'));
    else if(f==='fantasy') list=ANIME_DB.filter(a=>a.genres.some(g=>g.includes('Fantasy')));
    else if(f==='shonen') list=ANIME_DB.filter(a=>a.genres.includes('Shonen'));
    else if(f==='ongoing') list=ANIME_DB.filter(a=>a.status==='Ongoing');
    renderPopular(list);
  });
});
</script>
</body>
</html>
