<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Upload Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c10;
    --surface: #13151c;
    --card: #1a1d27;
    --border: #2a2d3e;
    --accent: #7c6aff;
    --accent2: #ff6b6b;
    --accent3: #43e8b0;
    --text: #e8e9f0;
    --muted: #6b6f85;
    --radius: 14px;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 24px;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124,106,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(67,232,176,0.06) 0%, transparent 60%);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.04em;
  }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s, transform 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,106,255,0.05), rgba(67,232,176,0.03));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .drop-zone:hover::before,
  .drop-zone.drag-over::before { opacity: 1; }

  .drop-zone:hover,
  .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,255,0.04);
    transform: translateY(-2px);
  }

  .drop-zone.drag-over { border-color: var(--accent3); }

  .drop-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    transition: transform 0.3s;
  }

  .drop-zone:hover .drop-icon { transform: scale(1.1) rotate(-5deg); }

  .drop-zone h2 {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .drop-zone p {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .browse-btn {
    display: inline-block;
    padding: 10px 28px;
    background: linear-gradient(135deg, var(--accent), #9d8fff);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: box-shadow 0.25s, transform 0.2s;
    letter-spacing: 0.02em;
  }

  .browse-btn:hover {
    box-shadow: 0 0 24px rgba(124,106,255,0.45);
    transform: translateY(-1px);
  }

  #file-input { display: none; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin: 20px 0;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    animation: fadeUp 0.5s 0.2s ease both;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .stats-bar.visible { opacity: 1; }

  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-img { background: var(--accent); }
  .dot-vid { background: var(--accent2); }
  .dot-file { background: var(--accent3); }

  .clear-all-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    padding: 4px 12px;
    border-radius: 50px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .clear-all-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Grid */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-top: 8px;
  }

  /* Card */
  .preview-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .preview-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--accent);
    border-color: var(--accent);
    z-index: 2;
  }

  /* Thumbnail area */
  .thumb-area {
    width: 100%;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: var(--surface);
  }

  .thumb-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .preview-card:hover .thumb-area img { transform: scale(1.06); }

  /* Video thumb */
  .thumb-area video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
    transition: background 0.2s;
  }

  .preview-card:hover .play-overlay { background: rgba(0,0,0,0.15); }

  .play-icon {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    padding-left: 3px;
  }

  /* File icon thumb */
  .file-icon-thumb {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .file-icon-big {
    font-size: 2.8rem;
    line-height: 1;
  }

  .file-ext-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    color: var(--muted);
  }

  /* Type color bands */
  .type-band {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
  }

  .band-image { background: linear-gradient(90deg, var(--accent), #c4b5ff); }
  .band-video { background: linear-gradient(90deg, var(--accent2), #ffaa6b); }
  .band-file  { background: linear-gradient(90deg, var(--accent3), #43c8e8); }

  /* Card footer */
  .card-footer {
    padding: 10px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .file-info { flex: 1; min-width: 0; }

  .file-name {
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .file-size {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Remove button */
  .remove-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.2);
    color: var(--accent2);
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
    line-height: 1;
    padding: 0;
    margin-top: 1px;
  }

  .remove-btn:hover {
    background: rgba(255,107,107,0.25);
    transform: scale(1.15) rotate(90deg);
  }

  /* Error card */
  .preview-card.error .thumb-area { background: rgba(255,107,107,0.06); }
  .error-msg {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent2);
    margin-top: 2px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    display: none;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>File Upload</h1>
    <p>// INSTANT PREVIEWS · MULTI-FILE · DRAG & DROP</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📁</div>
    <h2>Drop files here</h2>
    <p>Images, videos, or any file — up to 50 MB each</p>
    <button class="browse-btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
    <input type="file" id="file-input" multiple accept="*/*">
  </div>

  <div class="stats-bar" id="statsBar">
    <span class="stat"><span class="stat-dot dot-img"></span><span id="imgCount">0 images</span></span>
    <span class="stat"><span class="stat-dot dot-vid"></span><span id="vidCount">0 videos</span></span>
    <span class="stat"><span class="stat-dot dot-file"></span><span id="fileCount">0 files</span></span>
    <button class="clear-all-btn" onclick="clearAll()">✕ Clear all</button>
  </div>

  <div class="preview-grid" id="previewGrid"></div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('file-input');
  const grid = document.getElementById('previewGrid');
  const statsBar = document.getElementById('statsBar');

  let counts = { image: 0, video: 0, other: 0 };

  // ── Drag & drop events ──────────────────────────────────────────
  ['dragenter','dragover'].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag-over'); })
  );
  ['dragleave','drop'].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); })
  );
  dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
  fileInput.addEventListener('change', () => handleFiles(fileInput.files));

  // ── File handling ───────────────────────────────────────────────
  function handleFiles(files) {
    if (!files.length) return;
    statsBar.classList.add('visible');
    [...files].forEach(file => createCard(file));
    fileInput.value = '';
  }

  function getType(file) {
    if (file.type.startsWith('image/')) return 'image';
    if (file.type.startsWith('video/')) return 'video';
    return 'other';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function getExt(name) {
    return name.includes('.') ? name.split('.').pop().toUpperCase() : 'FILE';
  }

  function getFileIcon(ext) {
    const icons = {
      PDF: '📄', DOC: '📝', DOCX: '📝', XLS: '📊', XLSX: '📊',
      PPT: '📋', PPTX: '📋', ZIP: '🗜', RAR: '🗜', '7Z': '🗜',
      MP3: '🎵', WAV: '🎵', AAC: '🎵', OGG: '🎵',
      TXT: '📃', MD: '📃', JSON: '🔧', JS: '🔧', HTML: '🌐',
      CSS: '🎨', PY: '🐍', EXE: '⚙️', DMG: '💿',
    };
    return icons[ext] || '📎';
  }

  function updateStats() {
    document.getElementById('imgCount').textContent = counts.image + (counts.image === 1 ? ' image' : ' images');
    document.getElementById('vidCount').textContent = counts.video + (counts.video === 1 ? ' video' : ' videos');
    document.getElementById('fileCount').textContent = counts.other + (counts.other === 1 ? ' file' : ' files');
  }

  // ── Card builder ────────────────────────────────────────────────
  function createCard(file) {
    const type = getType(file);
    counts[type === 'image' ? 'image' : type === 'video' ? 'video' : 'other']++;
    updateStats();

    const card = document.createElement('div');
    card.className = 'preview-card';
    card.style.animationDelay = (grid.children.length * 50) + 'ms';

    const band = document.createElement('div');
    band.className = `type-band band-${type === 'other' ? 'file' : type}`;

    const thumbArea = document.createElement('div');
    thumbArea.className = 'thumb-area';

    const footer = document.createElement('div');
    footer.className = 'card-footer';

    const info = document.createElement('div');
    info.className = 'file-info';
    info.innerHTML = `<div class="file-name" title="${escHtml(file.name)}">${escHtml(file.name)}</div>
                      <div class="file-size">${formatSize(file.size)}</div>`;

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.title = 'Remove';
    removeBtn.textContent = '✕';
    removeBtn.onclick = () => {
      counts[type === 'image' ? 'image' : type === 'video' ? 'video' : 'other']--;
      updateStats();
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.8)';
      setTimeout(() => card.remove(), 300);
    };

    footer.appendChild(info);
    footer.appendChild(removeBtn);
    card.appendChild(band);
    card.appendChild(thumbArea);
    card.appendChild(footer);
    grid.appendChild(card);

    // ── Build preview ──
    if (type === 'image') {
      buildImagePreview(file, thumbArea, card);
    } else if (type === 'video') {
      buildVideoPreview(file, thumbArea);
    } else {
      buildFileIcon(file, thumbArea);
    }
  }

  function buildImagePreview(file, thumbArea, card) {
    const img = document.createElement('img');
    img.alt = file.name;

    const url = URL.createObjectURL(file);
    img.src = url;

    img.onload = () => { /* success — URL kept alive */ };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      card.classList.add('error');
      thumbArea.innerHTML = '';
      const errThumb = document.createElement('div');
      errThumb.className = 'file-icon-thumb';
      errThumb.innerHTML = `<div class="file-icon-big">⚠️</div>
                            <div class="file-ext-badge">BROKEN</div>`;
      thumbArea.appendChild(errThumb);
      const sizeEl = card.querySelector('.file-size');
      if (sizeEl) sizeEl.innerHTML += '<br><span class="error-msg">Could not load</span>';
    };

    thumbArea.appendChild(img);
  }

  function buildVideoPreview(file, thumbArea) {
    const video = document.createElement('video');
    video.muted = true;
    video.preload = 'metadata';
    video.src = URL.createObjectURL(file);

    video.onloadeddata = () => {
      video.currentTime = 1; // seek for a frame
    };

    const overlay = document.createElement('div');
    overlay.className = 'play-overlay';
    overlay.innerHTML = `<div class="play-icon">▶</div>`;

    thumbArea.appendChild(video);
    thumbArea.appendChild(overlay);
  }

  function buildFileIcon(file, thumbArea) {
    const ext = getExt(file.name);
    const icon = getFileIcon(ext);
    const wrapper = document.createElement('div');
    wrapper.className = 'file-icon-thumb';
    wrapper.innerHTML = `<div class="file-icon-big">${icon}</div>
                         <div class="file-ext-badge">${ext}</div>`;
    thumbArea.appendChild(wrapper);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function clearAll() {
    [...grid.children].forEach((card, i) => {
      setTimeout(() => {
        card.style.transition = 'opacity 0.25s, transform 0.25s';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.85)';
        setTimeout(() => card.remove(), 260);
      }, i * 40);
    });
    counts = { image: 0, video: 0, other: 0 };
    setTimeout(updateStats, grid.children.length * 40 + 300);
  }
</script>
</body>
</html>
